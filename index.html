<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Recherche produits PSM</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7f8;
      --panel: #ffffff;
      --ink: #172026;
      --muted: #5d6b75;
      --line: #d9e0e5;
      --accent: #006d77;
      --accent-strong: #00535b;
      --soft: #e7f4f4;
      --shadow: 0 10px 28px rgba(23, 32, 38, .08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.35;
    }
    header {
      background: var(--panel);
      border-bottom: 1px solid var(--line);
    }
    .wrap {
      width: min(1100px, calc(100% - 28px));
      margin: 0 auto;
    }
    .top { padding: 22px 0 16px; }
    h1 {
      margin: 0 0 6px;
      font-size: clamp(1.45rem, 3vw, 2rem);
      letter-spacing: 0;
    }
    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: .98rem;
    }
    main { padding: 18px 0 34px; }
    .search-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 14px;
      position: sticky;
      top: 0;
      z-index: 2;
    }
    .search-grid {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 12px;
      align-items: end;
    }
    label {
      display: block;
      font-weight: 700;
      font-size: .9rem;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      min-height: 46px;
      border: 1px solid #b9c5cc;
      border-radius: 6px;
      padding: 10px 12px;
      font: inherit;
      background: #fff;
      color: var(--ink);
    }
    input:focus {
      outline: 3px solid rgba(0, 109, 119, .18);
      border-color: var(--accent);
    }
    button {
      min-height: 46px;
      border: 0;
      border-radius: 6px;
      padding: 0 16px;
      font: inherit;
      font-weight: 700;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      white-space: nowrap;
    }
    button:hover, button:focus { background: var(--accent-strong); }
    .status {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      margin: 16px 0 10px;
      color: var(--muted);
      font-size: .95rem;
    }
    .count { font-weight: 700; color: var(--ink); }
    .results { display: grid; gap: 10px; }
    .container-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }
    .container-head {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 12px 14px;
      background: var(--soft);
      border-bottom: 1px solid var(--line);
    }
    .container-name {
      font-size: 1.05rem;
      font-weight: 800;
      overflow-wrap: anywhere;
    }
    .total {
      font-weight: 800;
      color: var(--accent-strong);
      text-align: right;
      white-space: nowrap;
    }
    .line {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(0, 1.4fr) auto;
      gap: 12px;
      padding: 12px 14px;
      border-top: 1px solid #edf1f3;
      align-items: start;
    }
    .line:first-child { border-top: 0; }
    .field-title {
      display: block;
      margin-bottom: 3px;
      color: var(--muted);
      font-size: .78rem;
      font-weight: 700;
      text-transform: uppercase;
    }
    .field-value { overflow-wrap: anywhere; }
    .qty {
      min-width: 78px;
      text-align: right;
      font-weight: 800;
    }
    .empty {
      background: var(--panel);
      border: 1px dashed #b9c5cc;
      border-radius: 8px;
      padding: 22px 16px;
      color: var(--muted);
      text-align: center;
    }
    @media (max-width: 720px) {
      .wrap { width: min(100% - 20px, 1100px); }
      .top { padding: 16px 0 12px; }
      main { padding-top: 10px; }
      .search-panel { padding: 12px; }
      .search-grid { grid-template-columns: 1fr; }
      button { width: 100%; }
      .container-head { grid-template-columns: 1fr; }
      .total { text-align: left; }
      .line { grid-template-columns: 1fr; gap: 8px; }
      .qty { text-align: left; min-width: 0; }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap top">
      <h1>Recherche produits PSM</h1>
      <p class="subtitle">Recherche par texte partiel dans le libellé catalogue ou le produit référentiel.</p>
    </div>
  </header>
  <main class="wrap">
    <section class="search-panel" aria-label="Recherche">
      <div class="search-grid">
        <div>
          <label for="libelle">Libellé catalogue</label>
          <input id="libelle" type="search" autocomplete="off" placeholder="Ex. atropine, ciprofloxacine...">
        </div>
        <div>
          <label for="produit">Produit référentiel</label>
          <input id="produit" type="search" autocomplete="off" placeholder="Ex. injectable, sonde...">
        </div>
        <button id="reset" type="button">RAZ</button>
      </div>
    </section>

    <div class="status" aria-live="polite">
      <div><span class="count" id="resultCount">0</span> contenant(s) trouvé(s)</div>
      <div id="lineCount">0 ligne(s)</div>
    </div>

    <section id="results" class="results"></section>
  </main>

{"contenant":"PED-00","quantite":15,"libelle":"SDE ASPIRATION 50CM CH10 19010011*","produit":"SONDE D’ASPIRATION CH 10 - 50 cm"},{"contenant":"PED-00","quantite":15,"libelle":"SDE ASPIRATION 40CM CH 8 07054508*","produit":"SONDE D’ASPIRATION CH 8 - 50 cm"},{"contenant":"PED-06","quantite":50,"libelle":"BANDELETTE GLYCEMIE ACCU-CHEK  / 07453736016*","produit":"BANDELETTES DE GLYCEMIE pour lecteur de glycémie"},{"contenant":"PED-06","quantite":1,"libelle":"LECTEUR ACCU-CHEK GUIDE MG.DL / 07400942016*","produit":"LECTEUR DE GLYCEMIE"},{"contenant":"PED-06","quantite":4,"libelle":"PILE BOUTON LITHIUM 3V 230MAH CR2032EXA*","produit":"PILES POUR LECTEUR DE GLYCEMIE - qs par lecteur"},{"contenant":"PED-00","quantite":25,"libelle":"COUVERTURE SURVIE 140X220CM 4210.00","produit":"COUVERTURE DRAP ALU ISOTHERME NON STERILE"},{"contenant":"PED-08","quantite":25,"libelle":"PANS GRAS JELONET10X40CM 7459 *","produit":"PANSEMENT INTERFACE Mailles serrées (TULLE GRAS Mailles serrées ou équivalent)"},{"contenant":"PED-02","quantite":100,"libelle":"PERFUSEUR GRAVITE ROBINET 3 VOIES A64-3V*","produit":"TUBULURE A PERFUSION + prise d'air incorporée + filtre + luer lock obligatoire + 1 site d'injection au moins"},{"contenant":"PED-01","quantite":2,"libelle":"CANULE DE GUEDEL N°0 L=5.5CM 1110055","produit":"CANULE OROPHARYNGEE N° 0"},{"contenant":"PED-01","quantite":5,"libelle":"DRAIN TROCART THORAC MOUSSE CH12 21112","produit":"DRAIN THORACIQUE type JOLY à embout mousse - CH 12"},{"contenant":"PED-01","quantite":5,"libelle":"DRAIN TROCART THORAC MOUSSE CH16  21116","produit":"DRAIN THORACIQUE type JOLY à embout mousse - CH 16 (environ 15 cm)"},{"contenant":"PED-09","quantite":3,"libelle":"GARROT PNEUMATIQUE","produit":"GARROT PNEUMATIQUE"},{"contenant":"PED-02","quantite":5,"libelle":"SET AIGUILLES PERF INTRA OS PED 15MM EZ-IO 9018P (rose)","produit":"AIGUILLE POUR DISPOSITIF DE PERFUSION INTRA-OSSEUSE MOTORISE Petite taille"}];
    const libelleInput = document.getElementById('libelle');
    const produitInput = document.getElementById('produit');
    const resetButton = document.getElementById('reset');
    const results = document.getElementById('results');
    const resultCount = document.getElementById('resultCount');
    const lineCount = document.getElementById('lineCount');

    function normalizeText(value) {
      return String(value || '')
        .normalize('NFD')
        .replace(/[̀-ͯ]/g, '')
        .toLowerCase()
        .trim();
    }

    function escapeHtml(value) {
      return String(value || '').replace(/[&<>'"]/g, char => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
      }[char]));
    }

    function formatQty(value) {
      return new Intl.NumberFormat('fr-FR', { maximumFractionDigits: 3 }).format(Number(value) || 0);
    }

    function matches(row, libelleQuery, produitQuery) {
      const libelleOk = !libelleQuery || normalizeText(row.libelle).includes(libelleQuery);
      const produitOk = !produitQuery || normalizeText(row.produit).includes(produitQuery);
      return libelleOk && produitOk;
    }

    function groupByContainer(rows) {
      const groups = new Map();
      for (const row of rows) {
        if (!groups.has(row.contenant)) {
          groups.set(row.contenant, { contenant: row.contenant, total: 0, rows: [] });
        }
        const group = groups.get(row.contenant);
        group.total += Number(row.quantite) || 0;
        group.rows.push(row);
      }
      return Array.from(groups.values()).sort((a, b) => a.contenant.localeCompare(b.contenant, 'fr'));
    }

    function render() {
      const libelleQuery = normalizeText(libelleInput.value);
      const produitQuery = normalizeText(produitInput.value);
      const hasQuery = libelleQuery || produitQuery;
      const filtered = hasQuery ? DATA.filter(row => matches(row, libelleQuery, produitQuery)) : [];
      const groups = groupByContainer(filtered);

      resultCount.textContent = groups.length;
      lineCount.textContent = `${filtered.length} ligne(s)`;

      if (!hasQuery) {
        results.innerHTML = '<div class="empty">Saisissez une partie de libellé catalogue ou de produit référentiel pour lancer la recherche.</div>';
        return;
      }
      if (!filtered.length) {
        results.innerHTML = '<div class="empty">Aucun contenant trouvé pour cette recherche.</div>';
        return;
      }

      results.innerHTML = groups.map(group => `
        <article class="container-card">
          <div class="container-head">
            <div class="container-name">${escapeHtml(group.contenant)}</div>
            <div class="total">Quantité totale : ${formatQty(group.total)}</div>
          </div>
          <div>
            ${group.rows.map(row => `
              <div class="line">
                <div><span class="field-title">Libellé catalogue</span><span class="field-value">${escapeHtml(row.libelle)}</span></div>
                <div><span class="field-title">Produit référentiel</span><span class="field-value">${escapeHtml(row.produit)}</span></div>
                <div class="qty"><span class="field-title">Quantité</span>${formatQty(row.quantite)}</div>
              </div>
            `).join('')}
          </div>
        </article>
      `).join('');
    }

    libelleInput.addEventListener('input', render);
    produitInput.addEventListener('input', render);
    resetButton.addEventListener('click', () => {
      libelleInput.value = '';
      produitInput.value = '';
      libelleInput.focus();
      render();
    });
    render();
  </script>
